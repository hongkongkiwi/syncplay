name: Android Build

on:
  push:
    paths:
      - 'react-native/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'react-native/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: react-native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --watch=false

  debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: react-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: react-native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('react-native/android/**/*.gradle*', 'react-native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Assemble debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: syncplay-mobile-debug
          path: react-native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    needs: test
    defaults:
      run:
        working-directory: react-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: react-native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('react-native/android/**/*.gradle*', 'react-native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Assemble release APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew :app:assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: syncplay-mobile-release
          path: react-native/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 90
