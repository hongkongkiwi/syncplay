name: Rust CI

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: cargo check + test + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: p2p/rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            p2p/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('p2p/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Check (lib)
        run: cargo check --features tui

      - name: Check (binaries)
        run: |
          cargo check --bin syncplay-signaling
          cargo check --bin syncplay-tui --features tui

      - name: Test
        run: cargo test --lib

      - name: Clippy
        run: cargo clippy --features tui --lib -- -D warnings

      - name: Format check
        run: cargo fmt --check

  release:
    name: Build release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: macos-amd64
    defaults:
      run:
        working-directory: p2p/rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build signaling server
        run: cargo build --release --target ${{ matrix.target }} --bin syncplay-signaling

      - name: Build TUI
        run: cargo build --release --target ${{ matrix.target }} --bin syncplay-tui --features tui

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/syncplay-signaling dist/
          cp target/${{ matrix.target }}/release/syncplay-tui dist/
          cd dist && tar czf ../syncplay-p2p-${{ matrix.suffix }}.tar.gz *

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncplay-p2p-${{ matrix.suffix }}
          path: p2p/rust/syncplay-p2p-${{ matrix.suffix }}.tar.gz
