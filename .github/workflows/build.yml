name: Rust CI

on:
  push:
    branches: [master]
    paths:
      - 'p2p/rust/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master]
    paths:
      - 'p2p/rust/**'
      - '.github/workflows/build.yml'

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: p2p/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: p2p/rust

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Format check
        run: cargo fmt -- --check

      - name: Type check (all targets)
        run: cargo check --features tui --all-targets

      - name: Clippy
        run: cargo clippy --features tui --all-targets -- -D warnings

      - name: Doc check
        run: cargo doc --no-deps --features tui

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: p2p/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: p2p/rust

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Unit tests
        run: cargo test --lib

      - name: Integration tests
        run: cargo test --test e2e_integration

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: p2p/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: p2p/rust

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build signaling server
        run: cargo build --release --bin syncplay-signaling

      - name: Build TURN relay
        run: cargo build --release --bin syncplay-turn

      - name: Build TUI client
        run: cargo build --release --features tui --bin syncplay-tui

      - name: Show binary sizes
        run: ls -lh target/release/syncplay-*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncplay-linux-x86_64
          path: |
            p2p/rust/target/release/syncplay-signaling
            p2p/rust/target/release/syncplay-tui
            p2p/rust/target/release/syncplay-turn

  release:
    name: Build release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: macos-amd64
    defaults:
      run:
        working-directory: p2p/rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build signaling server
        run: cargo build --release --target ${{ matrix.target }} --bin syncplay-signaling

      - name: Build TUI
        run: cargo build --release --target ${{ matrix.target }} --bin syncplay-tui --features tui

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/syncplay-signaling dist/
          cp target/${{ matrix.target }}/release/syncplay-tui dist/
          cd dist && tar czf ../syncplay-p2p-${{ matrix.suffix }}.tar.gz *

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncplay-p2p-${{ matrix.suffix }}
          path: p2p/rust/syncplay-p2p-${{ matrix.suffix }}.tar.gz
