name: iOS Build

on:
  push:
    paths:
      - 'react-native/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    paths:
      - 'react-native/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS app
    runs-on: macos-15
    defaults:
      run:
        working-directory: react-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: react-native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: react-native/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('react-native/ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        run: cd ios && pod install
        timeout-minutes: 10

      - name: Build iOS archive
        run: |
          cd ios
          xcodebuild \
            -workspace SyncplayMobile.xcworkspace \
            -scheme SyncplayMobile \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/SyncplayMobile.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
        timeout-minutes: 30

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: syncplay-mobile-ios
          path: ${{ runner.temp }}/SyncplayMobile.xcarchive
          retention-days: 90
